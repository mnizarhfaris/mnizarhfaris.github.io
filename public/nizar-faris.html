<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nizar Faris Personal Page</title>
  <meta name="description" content="Healthcare Business Support Specialist - I help medical clinics and healthcare business stay organized and efficient by providing remote administrative and operational support.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="nizar-faris.css">
</head>
<body>
  <div class="personal-page">
    <!-- Background -->
    <div class="page-background"></div>
    <div class="geometric-overlay"></div>

    <!-- Main Content -->
    <main class="page-content">
      <div class="content-card">
        <!-- Profile Image -->
        <div class="profile-image-container">
          <div class="profile-image-wrapper">
            <img 
              src="images/profile-photo.jpg" 
              alt="Nizar Faris" 
              class="profile-image"
            >
          </div>
        </div>

        <!-- Profile Info -->
        <h1 class="profile-name">M. Nizar Faris</h1>
        
        <div class="name-divider"></div>
        
        <h2 class="profile-title">Healthcare Business Support Specialist</h2>
        
        <p class="profile-description">
          I help medical clinics and healthcare business stay organized and efficient by providing remote administrative and operational support.
        </p>

        <!-- Links -->
        <nav class="links-container">
          <div class="links-grid">
            <!-- About Me -->
            <a href="#" class="link-button">
              <span class="link-button-text">About Me</span>
              <svg class="link-button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
            </a>

            <!-- LinkedIn -->
            <a href="#" class="link-button">
              <span class="link-button-text">LinkedIn</span>
              <svg class="link-button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path>
                <rect x="2" y="9" width="4" height="12"></rect>
                <circle cx="4" cy="4" r="2"></circle>
              </svg>
            </a>

            <!-- Portfolio -->
            <a href="#" class="link-button">
              <span class="link-button-text">Portfolio</span>
              <svg class="link-button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
              </svg>
            </a>

            <!-- WhatsApp -->
            <a href="#" class="link-button">
              <span class="link-button-text">WhatsApp</span>
              <svg class="link-button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
              </svg>
            </a>

            <!-- Instagram -->
            <a href="#" class="link-button">
              <span class="link-button-text">Instagram</span>
              <svg class="link-button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
              </svg>
            </a>

            <!-- Book a Call -->
            <a href="#" class="link-button">
              <span class="link-button-text">Book a Call</span>
              <svg class="link-button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
              </svg>
            </a>
          </div>
        </nav>
      </div>
    </main>
  </div>
</body>
</html>
